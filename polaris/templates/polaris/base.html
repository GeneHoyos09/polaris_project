<!DOCTYPE html>
{% load static %}
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Gestión de RRHH{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --brand-purple: #9254e9;
            --brand-purple-light: #935fcf;
            --brand-purple-dark: #6A3FA8;
            --bg-lavender-1: #EDE7F8;
            --bg-lavender-2: #DCD1F2;
            --surface: #FFFFFF;
            --orange: lab(64.88% 53.82 -32.82);
            --orange-light: #cc77c1;
            --green: #8bdd96;
            --green-light: #8ad8b7;
            --blue: #66c6f0;
            --blue-light: #7DD3FC;
            --pink: #e79393;
            --pink-light: #FCA5A5;
            --text-dark: #3B2E58;
            --text-muted: #8d73c7;
        }

        body {
            background: linear-gradient(135deg, var(--bg-lavender-1), var(--bg-lavender-2));
            min-height: 100vh;
            color: var(--text-dark);
        }

        .navbar {
            background: linear-gradient(90deg, var(--brand-purple-light), var(--brand-purple)) !important;
            box-shadow: 0 2px 10px rgba(124, 77, 191, 0.35);
        }
        .navbar .navbar-brand,
        .navbar .nav-link {
            color: #FFFFFF !important;
            font-weight: 500;
        }
        .navbar .nav-link:hover {
            color: #F0E8FF !important;
        }

        .content-card {
            background-color: var(--surface);
            border-radius: 18px;
            box-shadow: 0 8px 24px rgba(106, 63, 168, 0.12);
            padding: 2rem;
        }

        h1 {
            color: var(--text-dark);
        }
        h1 small.text-muted {
            color: var(--text-muted) !important;
        }

        .card {
            border: none;
            border-radius: 14px;
            overflow: hidden;
        }
        .card-header {
            border: none;
            font-weight: 600;
        }
        .card-header.bg-primary {
            background: linear-gradient(135deg, var(--orange-light), var(--orange)) !important;
            color: #4A3200 !important;
        }
        .card-header.bg-success {
            background: linear-gradient(135deg, var(--green-light), var(--green)) !important;
            color: #10351F !important;
        }

        .btn {
            border-radius: 10px;
            font-weight: 500;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--orange-light), var(--orange));
            border: none;
            color: #4A3200;
        }
        .btn-primary:hover, .btn-primary:focus {
            background: linear-gradient(135deg, var(--orange), #D97706);
            color: #3A2700;
        }
        .btn-outline-primary {
            border-color: var(--orange);
            color: #8A5A00;
        }
        .btn-outline-primary:hover {
            background: linear-gradient(135deg, var(--orange-light), var(--orange));
            border-color: var(--orange);
            color: #4A3200;
        }

        .btn-success {
            background: linear-gradient(135deg, var(--green-light), var(--green));
            border: none;
            color: #10351F;
        }
        .btn-success:hover, .btn-success:focus {
            background: linear-gradient(135deg, var(--green), #10B981);
            color: #0B2717;
        }
        .btn-outline-success {
            border-color: var(--green);
            color: #10703F;
        }
        .btn-outline-success:hover {
            background: linear-gradient(135deg, var(--green-light), var(--green));
            border-color: var(--green);
            color: #10351F;
        }

        .btn-warning {
            background: linear-gradient(135deg, var(--blue-light), var(--blue));
            border: none;
            color: #0B3A55;
        }
        .btn-warning:hover, .btn-warning:focus {
            background: linear-gradient(135deg, var(--blue), #0EA5E9);
            color: #072A3E;
        }

        .btn-danger {
            background: linear-gradient(135deg, var(--pink-light), var(--pink));
            border: none;
            color: #5B1414;
        }
        .btn-danger:hover, .btn-danger:focus {
            background: linear-gradient(135deg, var(--pink), #EF4444);
            color: #470F0F;
        }

        .btn-secondary {
            background-color: var(--bg-lavender-2);
            border: none;
            color: var(--text-dark);
        }
        .btn-secondary:hover, .btn-secondary:focus {
            background-color: #C7B8EA;
            color: var(--text-dark);
        }

        .table {
            --bs-table-bg: var(--surface);
        }
        .table thead {
            background: linear-gradient(90deg, var(--brand-purple-light), var(--brand-purple));
        }
        .table thead th {
            color: #FFFFFF !important;
            border: none;
            font-weight: 600;
        }
        .table-striped > tbody > tr:nth-of-type(odd) > * {
            background-color: var(--bg-lavender-1);
            color: var(--text-dark);
        }
        .table td, .table th {
            vertical-align: middle;
        }

        .alert-success {
            background: linear-gradient(135deg, var(--green-light), var(--green));
            border: none;
            color: #10351F;
        }

        form label.form-label {
            color: var(--text-dark);
            font-weight: 500;
        }

        .stat-card {
            border-radius: 16px;
            color: #FFFFFF;
            transition: transform 0.15s ease;
        }
        .stat-card:hover {
            transform: translateY(-3px);
        }
        .stat-icon {
            font-size: 1.75rem;
        }
        .stat-number {
            font-size: 2rem;
            font-weight: 700;
        }
        .stat-label {
            font-weight: 500;
            opacity: 0.95;
        }
        .stat-orange {
            background: linear-gradient(135deg, var(--orange-light), var(--orange));
        }
        .stat-green {
            background: linear-gradient(135deg, var(--green-light), var(--green));
        }
        .stat-blue {
            background: linear-gradient(135deg, var(--blue-light), var(--blue));
        }
        .stat-pink {
            background: linear-gradient(135deg, var(--pink-light), var(--pink));
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg mb-4">
        <div class="container">
            <a class="navbar-brand" href="{% url 'home' %}">📋 Gestión RRHH</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="{% url 'fbv:cargo_list' %}">Cargos (VBF)</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'fbv:empleado_list' %}">Empleados (VBF)</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'cbv:cargo_list' %}">Cargos (VBC)</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'cbv:empleado_list' %}">Empleados (VBC)</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container pb-5">
        <div class="content-card">
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-success alert-dismissible fade show" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                {% endfor %}
            {% endif %}

            {% block content %}{% endblock %}
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
